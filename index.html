<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Pagamento confirmado · AprovaCar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root{--bg:#050810;--bg2:#0d111f;--border:#1a1f2e;--accent:#FFB800;--accent2:#FFC83D;--text:#FFF;--muted:#9ca3af}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;min-height:100vh;overflow-x:hidden}
body{position:relative}
.glow{position:fixed;top:30%;left:50%;transform:translate(-50%,-50%);width:600px;height:400px;background:rgba(255,184,0,0.08);border-radius:50%;filter:blur(140px);pointer-events:none;z-index:0}
.conf{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:hidden;z-index:1}
.conf span{position:absolute;width:8px;height:8px;animation:fall 3.6s ease-in forwards;opacity:0;top:-20px}
.wrap{max-width:480px;margin:0 auto;padding:48px 24px;position:relative;z-index:2}
.logo{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:48px;animation:slideDown .6s cubic-bezier(.16,1,.3,1)}
.logo-badge{padding:8px;border-radius:12px;background:rgba(255,184,0,.1);border:1px solid rgba(255,184,0,.25)}
.logo svg{width:22px;height:22px;color:var(--accent);display:block}
.logo span{font-family:'Bebas Neue',sans-serif;letter-spacing:3px;font-size:22px;color:var(--text)}
.check-wrap{display:flex;justify-content:center;margin-bottom:28px;animation:scaleUp .7s cubic-bezier(.34,1.56,.64,1) .1s both}
.check{width:96px;height:96px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 0 60px rgba(255,184,0,.5);animation:pulseGlow 2.4s ease-in-out infinite}
.check svg{width:52px;height:52px;color:var(--bg);stroke-width:3.5;fill:none;stroke:currentColor}
.check svg path{stroke-dasharray:80;stroke-dashoffset:80;stroke-linecap:round;stroke-linejoin:round;animation:draw .6s cubic-bezier(.4,0,.6,1) .5s forwards}
h1{text-align:center;font-size:36px;font-weight:800;letter-spacing:-.5px;margin-bottom:14px;animation:slideUp .6s cubic-bezier(.16,1,.3,1) .25s both;line-height:1.1}
.frase{text-align:center;font-size:17px;color:var(--muted);line-height:1.6;margin-bottom:40px;padding:0 8px;animation:slideUp .6s cubic-bezier(.16,1,.3,1) .35s both}
.frase strong{color:var(--accent);font-weight:700}
.card{background:rgba(13,17,31,.8);backdrop-filter:blur(10px);border:1px solid var(--border);border-radius:16px;padding:8px 20px;margin-bottom:24px;animation:slideUp .6s cubic-bezier(.16,1,.3,1) .45s both}
.row{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid var(--border)}
.row:last-child{border-bottom:none}
.row .label{color:var(--muted);font-size:13px}
.row .val{color:var(--text);font-weight:600;font-size:14px;text-align:right}
.row .val.ok{color:var(--accent)}
.ctas{display:flex;gap:10px;flex-direction:column;animation:slideUp .6s cubic-bezier(.16,1,.3,1) .55s both}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:15px 24px;border-radius:12px;text-align:center;text-decoration:none;font-weight:700;font-size:15px;transition:all .2s;cursor:pointer}
.btn-primary{background:var(--accent);color:#0a0a0a;box-shadow:0 8px 24px rgba(255,184,0,.25)}
.btn-primary:hover{transform:translateY(-1px);background:var(--accent2);box-shadow:0 12px 32px rgba(255,184,0,.4)}
.btn-secondary{background:transparent;color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--bg2);border-color:rgba(255,184,0,.4)}
.btn svg{width:16px;height:16px}
.footer{text-align:center;color:#71798c;font-size:11px;margin-top:48px;line-height:1.6}
@keyframes pulseGlow{0%,100%{transform:scale(1);box-shadow:0 0 60px rgba(255,184,0,.5)}50%{transform:scale(1.05);box-shadow:0 0 90px rgba(255,184,0,.85)}}
@keyframes scaleUp{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes slideDown{from{transform:translateY(-20px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes draw{to{stroke-dashoffset:0}}
@keyframes fall{0%{transform:translateY(-20px) rotate(0);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
@media (max-width:480px){h1{font-size:30px}.frase{font-size:15px}.wrap{padding:36px 20px}}
</style>
</head>
<body>
<div class="glow"></div>
<div class="conf" id="conf"></div>
<div class="wrap">
  <div class="logo">
    <div class="logo-badge">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2 4 6v6c0 5 3.5 9.5 8 10 4.5-.5 8-5 8-10V6l-8-4z"/></svg>
    </div>
    <span>APROVACAR</span>
  </div>
  <div class="check-wrap">
    <div class="check">
      <svg viewBox="0 0 24 24"><path d="M5 12l5 5L20 7"/></svg>
    </div>
  </div>
  <h1>Pagamento confirmado!</h1>
  <p class="frase" id="frase">Pagamento confirmado · obrigado!</p>
  <div class="card" id="card"></div>
  <div class="ctas">
    <a class="btn btn-primary" href="https://aprovacarbrasil.com.br/" id="ctaPrimary">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Voltar ao início
    </a>
    <a class="btn btn-secondary" id="ctaSecondary" href="#" style="display:none" target="_blank" rel="noopener">
      Ver recibo InfinitePay
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6M15 3h6v6M10 14L21 3"/></svg>
    </a>
  </div>
  <div class="footer">
    MEDPLUS CLUB · Amorim &amp; Mota Advogados Associados<br>
    Pagamento processado pela InfinitePay · CloudWalk
  </div>
</div>
<script>
(function(){
  var q = new URLSearchParams(window.location.search);
  var tipo = (q.get('tipo')||'default').toLowerCase();
  var captureMethod = q.get('capture_method')||'';
  var transactionNsu = q.get('transaction_nsu')||q.get('transaction_id')||'';
  var slug = q.get('slug')||'';
  var receiptUrl = q.get('receipt_url')||'';
  var FRASES = {
    adesao: 'Bem-vindo à família <strong>AprovaCar</strong> 🚗💛 · sua proteção começa agora!',
    mensalidade: 'Sua proteção continua firme 🛡️ · obrigado pela confiança!',
    cota_evento: 'Sua cota foi recebida 🤝 · você acabou de proteger outro associado!',
    taxa_ativacao: 'Você está de volta! 🔋 · proteção reativada com sucesso.',
    'default': 'Pagamento confirmado ✅ · obrigado!'
  };
  document.getElementById('frase').innerHTML = FRASES[tipo] || FRASES['default'];
  var methodLabel = ({pix:'PIX',credit_card:'Cartão de crédito',tap:'InfiniteTap NFC'})[captureMethod] || captureMethod || '—';
  var idShort = transactionNsu ? (transactionNsu.slice(0,8)+'…') : '';
  var cardHtml = '<div class="row"><span class="label">Método</span><span class="val">'+methodLabel+'</span></div>';
  if (idShort) cardHtml += '<div class="row"><span class="label">ID transação</span><span class="val">'+idShort+'</span></div>';
  if (slug) cardHtml += '<div class="row"><span class="label">Fatura</span><span class="val">'+slug+'</span></div>';
  cardHtml += '<div class="row"><span class="label">Status</span><span class="val ok">✓ Aprovado</span></div>';
  document.getElementById('card').innerHTML = cardHtml;
  if (receiptUrl) {
    var s = document.getElementById('ctaSecondary');
    s.style.display = 'flex';
    s.href = receiptUrl;
  }
  var conf = document.getElementById('conf');
  var colors = ['#FFB800','#FFC83D','#FFFFFF','#FFB800'];
  for (var i=0;i<32;i++){
    var sp = document.createElement('span');
    sp.style.left = (Math.random()*100)+'%';
    sp.style.animationDelay = (Math.random()*1.6)+'s';
    sp.style.background = colors[Math.floor(Math.random()*colors.length)];
    sp.style.borderRadius = Math.random()>.5?'50%':'2px';
    var sz = (6+Math.random()*7);
    sp.style.width = sz+'px';
    sp.style.height = sz+'px';
    conf.appendChild(sp);
  }
})();
</script>
</body>
</html>
